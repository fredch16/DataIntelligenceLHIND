resources:
  jobs:
    Ingest_reference_data_Monthly:
      name: Ingest reference data (Monthly)
      schedule:
        quartz_cron_expression: 1 55 0 3 * ?
        timezone_id: UTC
        pause_status: UNPAUSED
      tasks:
        - task_key: fetch_reference_data_api
          spark_python_task:
            python_file: /Workspace/Users/bigbenri12@gmail.com/DataIntelligenceLHIND/scripts/references/ingest_all_references.py
          environment_key: Default
      queue:
        enabled: true
      environments:
        - environment_key: Default
          spec:
            environment_version: "4"
      performance_target: PERFORMANCE_OPTIMIZED

    Ingest_Operational_Data_Daily:
      name: Ingest Operational Data (Daily)
      email_notifications:
        on_failure:
          - frederickcharbonnier@icloud.com
      schedule:
        quartz_cron_expression: 58 55 1 * * ?
        timezone_id: UTC
        pause_status: UNPAUSED
      tasks:
        - task_key: Ingest_Daily_Flights_by_Route
          spark_python_task:
            python_file: /Workspace/Users/bigbenri12@gmail.com/DataIntelligenceLHIND/scripts/operational/get_flights_daily.py
          environment_key: Default
      queue:
        enabled: true
      environments:
        - environment_key: Default
          spec:
            environment_version: "4"
      performance_target: PERFORMANCE_OPTIMIZED
