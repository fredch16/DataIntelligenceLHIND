resources:
  jobs:
    Ingest_reference_data_Monthly:
      name: Ingest reference data (Monthly)
      schedule:
        quartz_cron_expression: 1 55 0 3 * ?
        timezone_id: UTC
        pause_status: UNPAUSED
      tasks:
        - task_key: fetch_reference_data_api
          spark_python_task:
            python_file: ../src/ingestion/fetch_all_references.py
          environment_key: Default
      queue:
        enabled: true
      environments:
        - environment_key: Default
          spec:
            environment_version: "4"
      performance_target: PERFORMANCE_OPTIMIZED

    Ingest_Operational_Data_Daily:
      name: Ingest Operational Data (Daily)
      email_notifications:
        on_failure:
          - frederickcharbonnier@icloud.com
      schedule:
        quartz_cron_expression: 58 55 1 * * ?
        timezone_id: UTC
        pause_status: UNPAUSED
      tasks:
        # Task 1: Fetch the API
        - task_key: fetch_api_data
          spark_python_task:
            python_file: ../src/ingestion/fetch_flights_on_route.py
          environment_key: Default

        # Task 2: Run Bronze Pipeline
        - task_key: refresh_bronze
          depends_on:
            - task_key: fetch_api_data
          pipeline_task:
            pipeline_id: ${resources.pipelines.lufthansa_bronze_pipeline.id}

        # Task 3: Run Silver Pipeline
        - task_key: refresh_silver
          depends_on:
            - task_key: refresh_bronze
          pipeline_task:
            pipeline_id: ${resources.pipelines.lufthansa_silver_pipeline.id}
        # Task 3: Run Gold Pipeline
        - task_key: refresh_gold
          depends_on:
            - task_key: refresh_silver
          pipeline_task:
            pipeline_id: ${resources.pipelines.lufthansa_gold_pipeline.id}
      queue:
        enabled: true
      environments:
        - environment_key: Default
          spec:
            environment_version: "4"
      performance_target: PERFORMANCE_OPTIMIZED
