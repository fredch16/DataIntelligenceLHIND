resources:
  jobs:
    # --- JOB 1: DAILY OPERATIONAL DATA ---
    Ingest_Operational_Data_Daily:
      name: "[${bundle.target}] Ingest Operational Data (Daily)"
      schedule:
        quartz_cron_expression: 58 55 1 * * ?
        timezone_id: UTC
        pause_status: UNPAUSED
      
      tasks:
        # Task A: Fetch from API
        - task_key: Ingest_Daily_Flights_by_Route
          job_cluster_key: ingestion_cluster
          spark_python_task:
            python_file: ../src/ingestion/fetch_flights_on_route.py

        # Task B: Run Auto Loader (Automation Trigger)
        # - task_key: Run_Bronze_Flights_Loader
        #   depends_on:
        #     - task_key: Ingest_Daily_Flights_by_Route
        #   job_cluster_key: ingestion_cluster
        #   spark_python_task:
        #     python_file: ../src/bronze/.py

    # --- JOB 2: MONTHLY REFERENCE DATA ---
    Ingest_reference_data_Monthly:
      name: "[${bundle.target}] Ingest reference data (Monthly)"
      schedule:
        quartz_cron_expression: 1 55 0 3 * ?
        timezone_id: UTC
        pause_status: UNPAUSED
      
      tasks:
        - task_key: fetch_reference_data_api
          job_cluster_key: ingestion_cluster
          spark_python_task:
            python_file: ../src/ingestion/fetch_all_references.py

    # --- SHARED CLUSTER CONFIG ---
    job_clusters:
      - job_cluster_key: ingestion_cluster
        new_cluster:
          spark_version: 14.3.x-scala2.12
          node_type_id: Standard_DS3_v2
          num_workers: 1
          spark_conf:
            spark.databricks.cluster.profile: singleNode
            spark.master: local[*]