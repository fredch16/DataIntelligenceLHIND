resources:
  pipelines:
    # --- 1. THE BRONZE PIPELINE ---
    lufthansa_bronze_pipeline:
      name: "[${bundle.target}] Lufthansa Bronze"
      catalog: main
      target: lufthansa_bronze 
      libraries:
        - file:
            path: ../src/bronze/ops_ingestion.py
        - file:
            path: ../src/bronze/ref_ingestion.py
      serverless: true
      continuous: false
      channel: PREVIEW

    # --- 2. THE SILVER PIPELINE ---
    lufthansa_silver_pipeline:
      name: "[${bundle.target}] Lufthansa Silver"
      catalog: main
      target: lufthansa_silver 
      libraries:
        - file:
            path: ../src/silver/silver_operations.py
        - file:
            path: ../src/silver/silver_references.py
      serverless: true
      continuous: false
      channel: PREVIEW
    
    lufthansa_gold_pipeline:
      name: "[${bundle.target}] Lufthansa Gold"
      catalog: main
      target: lufthansa_gold
      libraries:
       - file:
           path: ../src/gold/gold_flight_analytics.py
      serverless: true
      continuous: false
      channel: PREVIEW